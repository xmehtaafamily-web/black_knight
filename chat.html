<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black_knight Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6577633980455130"
      crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles.css?v=dark-safety-2" />
<script src="/private-room-video.js?v=private-video-1"></script>
<title>Black Knight Stranger Chat | Anonymous Random Chat</title>
<meta name="description" content="Use Black Knight stranger chat to meet new people online through anonymous live chat rooms without signup.">
<meta name="keywords" content="black knight stranger chat, anonymous chat, random chat, online chat rooms">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#020617">
</head>
  <body>
    <main class="app-shell in-room">
      <section id="chatPanel" class="panel chat-panel chat-mode" aria-label="Chat room">
        <div class="match-header">
          <div>
            <p class="eyebrow">Chat room</p>
            <h2 id="matchName">Waiting room</h2>
            <p id="reconnectCode" class="room-code"></p>
            <button id="copyCodeBtn" class="copy-code-btn" type="button">Copy reconnect code</button>
            <div id="profileChips" class="profile-chips"></div>
          </div>
          <div class="match-meta">
            <span id="modeStatus" class="live-dot">Chat mode</span>
            <span id="matchStatus" class="live-dot">Waiting</span>
          </div>
        </div>

        <div class="call-controls" aria-label="Chat controls">
          <button id="translateBtn" type="button">Translate</button>
          <button id="skipBtn" type="button">Next</button>
          <button id="blockBtn" type="button">Block</button>
          <button id="reportBtn" type="button">Report</button>
        </div>

        <div id="nextAdSlot" class="ad-slot next-ad-slot" data-ad-slot="chat"></div>

        <div class="icebreaker-card">
          <span>AI icebreaker</span>
          <strong>Ask them: What changed your life forever?</strong>
        </div>

        <div id="messages" class="messages" aria-live="polite">
          <div class="empty-state"><span class="radar-loader"></span><strong>Searching another soul...</strong></div>
        </div>
        <div id="typingIndicator" class="typing-indicator" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <input id="messageInput" type="text" maxlength="180" placeholder="Type a message..." />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <span></span>
        <p></p>
      </article>
    </template>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./ads.js"></script>
    <script src="./protection.js"></script>
    <script src="./safety-client.js"></script>
    <script src="./safety-client.js"></script>
    <script src="./room.js?v=feature-pack-1" data-room-mode="text"></script>
    <script src="./safety-client.js"></script>
<script src="/required-profile.js?v=profile-fix-2"></script>
<script src="/floating-menu.js"></script>
<script src="/interstitial.js?v=campaigns-2"></script>
<script>
  (() => {
    const videoOnlyWords = ["blur video", "camera off", "camera on", "mic off", "mic on", "end call", "cam", "mic", "end"];
    const hideVideoOnlyControls = () => {
      document.querySelectorAll("button, a, [role='button']").forEach((element) => {
        const text = String(element.textContent || element.getAttribute("aria-label") || "").trim().toLowerCase();
        if (videoOnlyWords.includes(text)) {
          element.hidden = true;
          element.style.display = "none";
        }
      });
    };
    document.addEventListener("DOMContentLoaded", hideVideoOnlyControls);
    setInterval(hideVideoOnlyControls, 1200);
  })();
</script>
</body>
</html>
