<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black_knight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6577633980455130"
      crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell start-shell">
      <section class="panel intro-panel" aria-label="Start matching">
        <nav class="topbar">
          <div class="brand">
            <span class="brand-mark">BK</span>
            <span>Black_knight</span>
          </div>
          <span class="status-pill">18+ safe matching</span>
        </nav>

        <div class="ad-slot ad-slot-top" data-ad-slot="start"></div>

        <div class="intro-copy">
          <p class="eyebrow">Random chat and video matching</p>
          <h1>Choose how you want to meet.</h1>
          <p>Chat and Video Chat open as separate rooms after you start matching.</p>
        </div>

        <form id="profileForm" class="setup-form">
          <label>
            Display name
            <input id="displayName" type="text" maxlength="24" placeholder="Guest user" />
          </label>

          <label>
            Email optional
            <input id="emailInput" type="email" maxlength="64" placeholder="For reconnect only" />
          </label>

          <label>
            Saved reconnect code
            <input id="savedCodeInput" type="text" maxlength="16" placeholder="Auto-saved after first match" />
          </label>

          <div class="field-group">
            <span>Your gender</span>
            <div class="segmented" role="radiogroup" aria-label="Your gender">
              <label><input type="radio" name="gender" value="male" checked /> Male</label>
              <label><input type="radio" name="gender" value="female" /> Female</label>
            </div>
          </div>

          <div class="field-group">
            <span>Match with</span>
            <div class="segmented" role="radiogroup" aria-label="Match preference">
              <label><input type="radio" name="preference" value="female" checked /> Female</label>
              <label><input type="radio" name="preference" value="male" /> Male</label>
            </div>
          </div>

          <div class="field-group">
            <span>Choose mode</span>
            <div class="segmented" role="radiogroup" aria-label="Chat mode">
              <label><input type="radio" name="chatMode" value="text" checked /> Chat</label>
              <label><input type="radio" name="chatMode" value="video" /> Video Chat</label>
            </div>
          </div>

          <label class="check-row">
            <input id="ageCheck" type="checkbox" />
            <span>I confirm I am 18 or older.</span>
          </label>

          <button class="primary-action" type="submit">Start random chat</button>
          <a class="secondary-link" href="./reconnect.html">Reconnect with a saved code</a>
        </form>

        <footer class="legal-links">
          <a href="./about.html">About</a>
          <a href="./contact.html">Contact</a>
          <a href="./privacy.html">Privacy</a>
          <a href="./terms.html">Terms</a>
          <a href="./safety.html">Safety</a>
        </footer>
      </section>
    </main>

    <script src="./ads.js"></script>
    <script src="./home.js"></script>
  </body>
</html>
