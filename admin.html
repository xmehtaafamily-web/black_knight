<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black_knight Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .admin-shell {
        width: min(980px, calc(100% - 32px));
        margin: 24px auto;
      }

      .admin-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .reports-list {
        display: grid;
        gap: 10px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .stat-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: white;
      }

      .stat-card span {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .stat-card strong {
        display: block;
        margin-top: 6px;
        font-size: 1.6rem;
      }

      .analytics-panel {
        display: grid;
        gap: 12px;
        margin-bottom: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: white;
      }

      .chart-row {
        display: grid;
        grid-template-columns: 78px 1fr 92px;
        align-items: center;
        gap: 10px;
        font-size: 0.86rem;
      }

      .chart-bar {
        position: relative;
        height: 18px;
        overflow: hidden;
        border-radius: 999px;
        background: #edf3ef;
      }

      .chart-fill {
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
      }

      .login-box {
        display: grid;
        gap: 12px;
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        background: white;
      }

      .admin-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .report-card {
        display: grid;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: white;
      }

      .report-card.reviewed {
        opacity: 0.72;
      }

      .report-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .secondary-action {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        color: #29362f;
        background: #edf3ef;
        font-weight: 800;
      }

      .danger-action {
        color: white;
        background: var(--danger);
      }

      .report-card strong {
        font-size: 1rem;
      }

      .report-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Black_knight Admin</p>
          <h1 style="max-width: none; font-size: 2.4rem;">Reports</h1>
        </div>
        <div class="admin-actions">
          <button id="refreshBtn" class="primary-action" type="button">Refresh</button>
          <button id="logoutBtn" class="primary-action" type="button">Logout</button>
        </div>
      </header>

      <form id="loginForm" class="login-box">
        <label>
          Admin password
          <input id="passwordInput" type="password" placeholder="Enter admin password" />
        </label>
        <button class="primary-action" type="submit">Login</button>
        <p id="loginError" style="margin: 0; color: var(--danger);"></p>
      </form>

      <section id="statsGrid" class="stats-grid"></section>

      <section id="analyticsPanel" class="analytics-panel"></section>

      <section id="reportsList" class="reports-list panel" style="padding: 14px;">
        <div class="empty-state">Loading reports...</div>
      </section>

      <section id="bansList" class="reports-list panel" style="padding: 14px; margin-top: 14px;">
        <div class="empty-state">Loading bans...</div>
      </section>
    </main>

    <script>
      const loginForm = document.querySelector("#loginForm");
      const passwordInput = document.querySelector("#passwordInput");
      const loginError = document.querySelector("#loginError");
      const reportsList = document.querySelector("#reportsList");
      const bansList = document.querySelector("#bansList");
      const statsGrid = document.querySelector("#statsGrid");
      const analyticsPanel = document.querySelector("#analyticsPanel");
      const refreshBtn = document.querySelector("#refreshBtn");
      const logoutBtn = document.querySelector("#logoutBtn");

      function setLoggedIn(loggedIn) {
        loginForm.style.display = loggedIn ? "none" : "grid";
        reportsList.style.display = loggedIn ? "grid" : "none";
        bansList.style.display = loggedIn ? "grid" : "none";
        statsGrid.style.display = loggedIn ? "grid" : "none";
        analyticsPanel.style.display = loggedIn ? "grid" : "none";
        refreshBtn.style.display = loggedIn ? "inline-block" : "none";
        logoutBtn.style.display = loggedIn ? "inline-block" : "none";
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat(undefined, {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(new Date(value));
      }

      let currentReports = [];
      let currentBans = [];

      function renderStats(stats) {
        statsGrid.innerHTML = [
          ["Online", stats.onlineUsers],
          ["Waiting", stats.waitingUsers],
          ["Open reports", stats.openReports],
          ["Total bans", stats.totalBans],
        ]
          .map(([label, value]) => `<article class="stat-card"><span>${label}</span><strong>${value}</strong></article>`)
          .join("");
      }

      function renderAnalytics(analytics) {
        const rows = analytics.rows || [];
        const maxTotal = Math.max(1, ...rows.map((row) => row.total));
        const formatter = new Intl.DateTimeFormat(undefined, {
          hour: "2-digit",
          day: "2-digit",
          month: "short",
        });

        analyticsPanel.innerHTML = `
          <div>
            <p class="eyebrow">Analytics</p>
            <h2 style="margin: 0;">Last 48 hours</h2>
          </div>
          <div class="stats-grid">
            <article class="stat-card"><span>Total joins</span><strong>${analytics.totals.total}</strong></article>
            <article class="stat-card"><span>Male</span><strong>${analytics.totals.male}</strong></article>
            <article class="stat-card"><span>Female</span><strong>${analytics.totals.female}</strong></article>
            <article class="stat-card"><span>Peak active</span><strong>${analytics.totals.peakActive}</strong></article>
          </div>
          ${
            rows.length
              ? rows
                  .map(
                    (row) => `
                      <div class="chart-row">
                        <span>${formatter.format(new Date(row.hour))}</span>
                        <div class="chart-bar"><div class="chart-fill" style="width: ${(row.total / maxTotal) * 100}%"></div></div>
                        <strong>${row.total} / M${row.male} F${row.female}</strong>
                      </div>
                    `,
                  )
                  .join("")
              : '<div class="empty-state">No analytics yet.</div>'
          }
        `;
      }

      function renderReports(reports) {
        currentReports = reports;

        if (!reports.length) {
          reportsList.innerHTML = '<div class="empty-state">No reports yet.</div>';
          return;
        }

        reportsList.innerHTML = reports
          .map(
            (report) => `
              <article class="report-card ${report.status === "reviewed" ? "reviewed" : ""}">
                <strong>${escapeHtml(report.matchName)}</strong>
                <p style="margin: 0;">${escapeHtml(report.reason)}</p>
                <div class="report-meta">
                  <span class="live-dot">${escapeHtml(report.status || "open")}</span>
                  <span class="live-dot">${escapeHtml(report.mode)}</span>
                  <span class="live-dot">By ${escapeHtml(report.reporterName)}</span>
                  <span class="live-dot">Reported ${escapeHtml(report.matchContactMasked || "unverified legacy")}</span>
                  <span class="live-dot">${formatDate(report.createdAt)}</span>
                </div>
                <div class="report-actions">
                  <button class="secondary-action" type="button" data-action="review" data-id="${escapeHtml(report.id)}">
                    Mark reviewed
                  </button>
                  <button class="secondary-action danger-action" type="button" data-action="ban" data-id="${escapeHtml(report.id)}">
                    Ban verified user
                  </button>
                </div>
              </article>
            `,
          )
          .join("");
      }

      async function loadReports() {
        const statsResponse = await fetch("/api/admin/stats");
        if (statsResponse.ok) renderStats(await statsResponse.json());

        const analyticsResponse = await fetch("/api/admin/analytics");
        if (analyticsResponse.ok) renderAnalytics(await analyticsResponse.json());

        reportsList.innerHTML = '<div class="empty-state">Loading reports...</div>';
        const response = await fetch("/api/reports");
        if (response.status === 401) {
          setLoggedIn(false);
          return;
        }
        renderReports(await response.json());

        const bansResponse = await fetch("/api/bans");
        if (bansResponse.ok) {
          currentBans = await bansResponse.json();
          bansList.innerHTML = currentBans.length
            ? currentBans
                .map(
                  (ban) => `
                    <article class="report-card">
                      <strong>${escapeHtml(ban.contactMasked || ban.name || "Unknown")}</strong>
                      <p style="margin: 0;">${escapeHtml(ban.reason || "Admin ban")}</p>
                      <div class="report-actions">
                        <button class="secondary-action" type="button" data-action="unban" data-id="${escapeHtml(ban.id)}">
                          Unban
                        </button>
                      </div>
                    </article>
                  `,
                )
                .join("")
            : '<div class="empty-state">No bans yet.</div>';
        }
      }

      async function checkLogin() {
        const response = await fetch("/api/admin/me");
        const data = await response.json();
        setLoggedIn(data.loggedIn);
        if (data.loggedIn) {
          loadReports();
        }
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginError.textContent = "";

        const response = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: passwordInput.value }),
        });

        if (!response.ok) {
          loginError.textContent = "Wrong password.";
          return;
        }

        passwordInput.value = "";
        setLoggedIn(true);
        loadReports();
      });

      logoutBtn.addEventListener("click", async () => {
        await fetch("/api/admin/logout", { method: "POST" });
        setLoggedIn(false);
      });

      refreshBtn.addEventListener("click", loadReports);

      reportsList.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;

        const report = currentReports.find((item) => item.id === button.dataset.id);
        if (!report) return;

        if (button.dataset.action === "review") {
          await fetch(`/api/reports/${encodeURIComponent(report.id)}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: "reviewed" }),
          });
          loadReports();
        }

        if (button.dataset.action === "ban") {
          const banTarget = report.matchContactMasked || report.matchName;
          const confirmed = window.confirm(`Ban "${banTarget}"?`);
          if (!confirmed) return;

          await fetch("/api/bans", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: report.matchName,
              contact: report.matchContact,
              reason: report.reason,
            }),
          });

          await fetch(`/api/reports/${encodeURIComponent(report.id)}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: "reviewed" }),
          });

          loadReports();
        }
      });

      bansList.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action='unban']");
        if (!button) return;
        await fetch(`/api/bans/${encodeURIComponent(button.dataset.id)}`, { method: "DELETE" });
        loadReports();
      });

      checkLogin();
    </script>
  </body>
</html>
