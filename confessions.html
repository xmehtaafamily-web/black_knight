<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confession Wall - Black_knight</title>
    <link rel="stylesheet" href="./styles.css?v=dark-safety-2" />
  </head>
  <body>
    <main class="app-shell start-shell feature-shell">
      <section class="panel intro-panel">
        <nav class="topbar">
          <div class="brand"><span class="brand-mark">BK</span><span>Confession Wall</span></div>
          <a class="secondary-link compact-link" href="./index.html">Home</a>
        </nav>
        <div class="intro-copy">
          <p class="eyebrow">Anonymous Feed</p>
          <h1>Say it without a name.</h1>
          <p>Post anonymous confessions and react without exposing identity.</p>
        </div>
        <form id="confessionForm" class="confession-form">
          <textarea id="confessionInput" maxlength="240" placeholder="I still miss someone from 2022."></textarea>
          <button class="primary-action" type="submit">Post anonymously</button>
        </form>
        <section id="confessionFeed" class="confession-feed"></section>
      </section>
    </main>
    <script src="./confessions.js"></script>
  </body>
</html>
