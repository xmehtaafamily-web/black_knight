<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black_knight Reconnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6577633980455130"
      crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel intro-panel" aria-label="Reconnect">
        <nav class="topbar">
          <div class="brand">
            <span class="brand-mark">BK</span>
            <span>Black_knight</span>
          </div>
          <span class="status-pill">Private reconnect</span>
        </nav>

        <div class="intro-copy">
          <p class="eyebrow">Reconnect</p>
          <h1>Use a saved code to meet again.</h1>
          <p>Both people must enter the same reconnect code to join the private room.</p>
        </div>

        <form id="reconnectForm" class="setup-form">
          <label>
            Display name
            <input id="displayName" type="text" maxlength="24" placeholder="Guest user" />
          </label>

          <label>
            Reconnect code
            <input id="codeInput" type="text" maxlength="16" placeholder="Example: BK-123456" />
          </label>

          <div class="field-group">
            <span>Choose mode</span>
            <div class="segmented" role="radiogroup" aria-label="Chat mode">
              <label><input type="radio" name="chatMode" value="text" checked /> Chat</label>
              <label><input type="radio" name="chatMode" value="video" /> Video Chat</label>
            </div>
          </div>

          <label class="check-row">
            <input id="ageCheck" type="checkbox" />
            <span>I confirm I am 18 or older.</span>
          </label>

          <button class="primary-action" type="submit">Join private room</button>
        </form>
      </section>

      <section id="chatPanel" class="panel chat-panel idle" aria-label="Private chat room">
        <div class="match-header">
          <div>
            <p class="eyebrow">Private room</p>
            <h2 id="matchName">Waiting room</h2>
            <p id="reconnectCode" class="room-code"></p>
          </div>
          <div class="match-meta">
            <span id="modeStatus" class="live-dot">Chat mode</span>
            <span id="matchStatus" class="live-dot">Offline</span>
          </div>
        </div>

        <div class="video-stage">
          <div class="video-tile local">
            <video id="localVideo" autoplay muted playsinline></video>
            <span class="camera-icon">.</span>
            <strong>You</strong>
          </div>
          <div class="video-tile remote">
            <video id="remoteVideo" autoplay playsinline></video>
            <span class="camera-icon">.</span>
            <strong id="remoteLabel">Match</strong>
          </div>
        </div>

        <div class="call-controls" aria-label="Call controls">
          <button id="videoBtn" type="button">Start video</button>
          <button id="skipBtn" type="button">Leave</button>
          <button id="blockBtn" type="button">Block</button>
          <button id="reportBtn" type="button">Report</button>
        </div>

        <div id="messages" class="messages" aria-live="polite">
          <div class="empty-state">Enter a reconnect code to join.</div>
        </div>

        <form id="chatForm" class="chat-form">
          <input id="messageInput" type="text" maxlength="180" placeholder="Type a message..." />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <span></span>
        <p></p>
      </article>
    </template>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./protection.js"></script>
    <script src="./reconnect.js"></script>
  </body>
</html>
